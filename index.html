    <!-- Calendly badge widget -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

    <script type="text/javascript">
      window.addEventListener('message', function(e) {
        if (!e.data) return;
        var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (!data.event) return;
        if (data.event === 'calendly.event_type_viewed') {
          if (typeof gtag !== 'undefined') {
            gtag('event', 'calendly_popup_opened', { event_category: 'engagement' });
          }
        }
        if (data.event === 'calendly.event_scheduled') {
          if (typeof gtag !== 'undefined') {
            gtag('event', 'calendly_booking_completed', { event_category: 'conversion' });
          }
        }
      });
    </script>

    <script type="text/javascript">

    <!-- Google tag (gtag.js) — skipped on localhost -->
    <script>
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-5BVWJML3HE';

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        gtag('config', 'G-5BVWJML3HE');
      }
